{% extends "inc/layout.html" %}

{% block title %}Page Not Found — Alex Gusev{% endblock %}

{% block content %}
<div class="card not-found">
    <h1>Page not found</h1>
    <p>The link may be outdated or the address was typed with a mistake. Head to one of the main sections:</p>
    <nav class="not-found-links">
        <a href="/{{ locale }}/">Home</a>
        <a href="/{{ locale }}/blog/">Blog</a>
        <a href="/{{ locale }}/contact.html">Contact</a>
    </nav>
</div>

<style>
    .not-found {
        text-align: center;
        padding-bottom: 0.5rem;
    }

    .not-found p {
        max-width: 560px;
        margin: 0.5rem auto 1.5rem;
    }

    .not-found-links {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
        background-color: transparent;
        border: 0;
        box-shadow: none;
        width: auto;
        padding: 0;
    }

    .not-found-links a {
        display: inline-block;
        padding: 0.5rem 1rem;
        border: 1px solid #007B5E;
        background-color: #fff;
        color: #007B5E;
        text-decoration: none;
        border-radius: 4px;
        transition: background-color 0.3s ease;
    }

    .not-found-links a:hover {
        background-color: #e6f2ef;
    }
</style>
{% endblock %}
