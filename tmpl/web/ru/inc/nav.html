<header class="site-header">
    <div class="header-inner">
        <a class="site-brand" href="/{{ locale }}/" aria-label="Алекс Гусев — главная">
            <img class="brand-mark" src="/favicon.ico" alt="" width="41" height="41"/>
            <span class="brand-copy">
                <strong>Алекс Гусев</strong>
                <small>Системы · Агенты · Веб</small>
            </span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Открыть меню" data-label-open="Открыть меню" data-label-close="Закрыть меню">
            <span class="nav-toggle-lines" aria-hidden="true"></span>
        </button>
        <div class="site-menu" id="site-menu" data-open="false">
            <nav class="primary-nav" aria-label="Основная навигация">
                <a href="/{{ locale }}/">Главная</a>
                <a href="/{{ locale }}/projects.html">Проекты</a>
                <a href="/{{ locale }}/library/">Библиотека</a>
                <a href="/{{ locale }}/blog/">Журнал</a>
                <a href="/{{ locale }}/contact.html">Контакты</a>
            </nav>
            <div class="locale-switcher" role="group" aria-label="Язык">
                {% for loc in allowedLocales %}
                {% if loc == locale %}
                <span aria-current="true">{{ loc | upper }}</span>
                {% else %}
                <a href="/{{ loc }}/" data-locale-target="{{ loc }}" lang="{{ loc }}" hreflang="{{ loc }}">{{ loc | upper }}</a>
                {% endif %}
                {% endfor %}
            </div>
        </div>
    </div>
</header>
