<header class="site-header">
    <div class="header-inner">
        <a class="site-brand" href="/{{ locale }}/" aria-label="Alex Gusev — inicio">
            <img class="brand-mark" src="/favicon.ico" alt="" width="41" height="41"/>
            <span class="brand-copy">
                <strong>Alex Gusev</strong>
                <small>Sistemas · Agentes · Web</small>
            </span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Abrir menú" data-label-open="Abrir menú" data-label-close="Cerrar menú">
            <span class="nav-toggle-lines" aria-hidden="true"></span>
        </button>
        <div class="site-menu" id="site-menu" data-open="false">
            <nav class="primary-nav" aria-label="Navegación principal">
                <a href="/{{ locale }}/">Inicio</a>
                <a href="/{{ locale }}/projects.html">Proyectos</a>
                <a href="/{{ locale }}/library/">Biblioteca</a>
                <a href="/{{ locale }}/blog/">Bitácora</a>
                <a href="/{{ locale }}/contact.html">Contacto</a>
            </nav>
            <div class="locale-switcher" role="group" aria-label="Idioma">
                {% for loc in allowedLocales %}
                {% if loc == locale %}
                <span aria-current="true">{{ loc | upper }}</span>
                {% else %}
                <a href="/{{ loc }}/" data-locale-target="{{ loc }}" lang="{{ loc }}" hreflang="{{ loc }}">{{ loc | upper }}</a>
                {% endif %}
                {% endfor %}
            </div>
        </div>
    </div>
</header>
