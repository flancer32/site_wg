<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Wiredgeese Devs">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <title>Wiredgeese Devs</title>
    <link href="https://fonts.googleapis.com/css?family=Material+Icons" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/quasar@2.11.5/dist/quasar.prod.css" rel="stylesheet" type="text/css">
    <style>
        BODY {
            margin: 0;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script>
        // prepare environment to load GA script
        const GA_CODE = (location.hostname === 'wiredgeese.com') ? 'G-48WM3FE8HL' : 'G-KGZJBZCNB8';
        window.dataLayer = window.dataLayer || [];

        function gtag() {dataLayer.push(arguments);}

        gtag('js', new Date());
        gtag('config', GA_CODE);

        // append SCRIPT tag to HEAD and start loading of GA script
        const elScript = document.createElement('script');
        elScript.src = `https://www.googletagmanager.com/gtag/js?id=${GA_CODE}`;
        document.getElementsByTagName('head')[0].appendChild(elScript);
    </script>
</head>
<body>
<div id="q-app"></div>

<!-- External and additional scripts and styles -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2.11.5/dist/quasar.umd.prod.js"></script>
<script src="https://unpkg.com/vue-router@4.1.6/dist/vue-router.global.prod.js"></script>


<!-- These styles are loaded after landing page is displayed -->
<link rel="stylesheet" href="./styles.css">

<script type="module">
    import appComp from './src/app.mjs';
    import layoutComp from './src/ui/layout.mjs';
    import router from './src/router.mjs';
    import uiFooter from './src/ui/layout/footer.mjs';
    import uiPage from './src/ui/layout/page.mjs';

    // create and setup Vue app
    const app = Vue.createApp(appComp);
    app.use(Quasar);
    app.component('layout', layoutComp);
    app.component('uiFooter', uiFooter);
    app.component('uiPage', uiPage);
    // setup router
    app.use(router);
    router.afterEach((to) => {
        if (typeof window.gtag === 'function')
            window.gtag('event', 'page_view', {
                page_path: to.fullPath,
            });
    })
    // mount app to the page
    app.mount('BODY > DIV');
</script>

</body>
</html>
