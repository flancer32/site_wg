<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Wiredgeese Devs">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Wiredgeese Devs</title>
    <link href="https://fonts.googleapis.com/css?family=Material+Icons" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/quasar@2.11.5/dist/quasar.prod.css" rel="stylesheet" type="text/css">
    <style>
        BODY {
            margin: 0;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-48WM3FE8HL"></script>

<body>
<div id="q-app"></div>

<!-- External and additional scripts and styles -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2.11.5/dist/quasar.umd.prod.js"></script>
<script src="https://unpkg.com/vue-router@4.1.6/dist/vue-router.global.prod.js"></script>


<!-- These styles are loaded after landing page is displayed -->
<link rel="stylesheet" href="./styles.css">

<script type="module">
    import uiTitle from './src/ui/lib/title.mjs';
    import uiPage from './src/ui/lib/page.mjs';
    import appComp from './src/app.mjs';
    import layoutComp from './src/ui/layout.mjs';
    import router from './src/router.mjs';
    // create Vue app and mount to the page
    const app = Vue.createApp(appComp);
    app.use(Quasar);
    app.use(router);
    app.component('layout', layoutComp);
    app.component('uiPage', uiPage);
    app.component('uiTitle', uiTitle);
    app.mount('BODY > DIV');
</script>

</body>
